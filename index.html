<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>THE OBSERVER</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">THE OBSERVER</div>
      <div class="header-controls">
        <div class="lang-selector">
          <select id="langSelect" onchange="changeLanguage(this.value)">
            <option value="en">ENGLISH</option>
            <option value="pt">PORTUGUÊS</option>
          </select>
        </div>
        <div class="status-bar">
          <div class="status-item">
            <div class="status-dot"></div>
            <span id="label-online">ONLINE</span>
          </div>
          <div class="status-item">
            <span id="label-day">DAY</span>
            <span class="day-counter" id="dayCounter">001</span>
          </div>
        </div>
      </div>
    </header>

    <main class="terminal">
      <div class="terminal-header" id="terminal-title">▸ INCOMING TRANSMISSIONS // TERMINAL_07</div>
      <div id="caseInfo" class="case-info" style="display:none">
        <span id="label-crime">INCIDENT</span>: <span id="crimeDescription"></span>
      </div>
      <div class="terminal-content" id="messageStream"></div>
    </main>

    <aside class="side-panel">
      <div class="panel">
        <div class="panel-title" id="title-analysis">Subject Analysis</div>
        <div class="analysis-board" id="subjectBoard"></div>
      </div>

      <div class="panel">
        <div class="panel-title" id="title-signals">Signal Log</div>
        <div class="signal-log" id="signalLog"></div>
      </div>

      <div class="panel">
        <div class="panel-title" id="title-actions">Actions</div>
        <div class="action-panel">
          <button onclick="exposeSubject()" id="btn-expose">▸ EXPOSE selected</button>
          <button onclick="pressureSubject()" id="btn-pressure">▸ PRESSURE subject</button>
          <button onclick="plantDoubt()" id="btn-doubt">▸ PLANT doubt</button>
          <button onclick="isolateSubject()" id="btn-isolate">▸ ISOLATE target</button>
          <button onclick="probeSubject()" id="btn-observe">▸ PROBE subject</button>
          <button onclick="accuseSubject()" id="btn-accuse" class="btn-accuse">▸ ACCUSE selected</button>
        </div>
      </div>

      <div class="panel">
        <div class="panel-title" id="title-ranking">Case History</div>
        <div class="ranking-list" id="rankingList"></div>
      </div>
    </aside>

    <footer>
      <span id="footer-version">SYSTEM v0.1.0 // OBSERVATION PROTOCOL ACTIVE</span>
      <span><span id="label-reputation">REPUTATION</span>: <span id="reputation">NEUTRAL</span></span>
    </footer>
  </div>

  <!-- Result Overlay -->
  <div id="resultOverlay" class="result-overlay" style="display:none">
    <div class="result-card">
      <div class="result-title" id="resultTitle">CASE CLOSED</div>
      <div class="result-body" id="resultBody"></div>
      <button id="nextDayBtn" onclick="nextDay()" class="result-btn">▸ NEXT DAY</button>
    </div>
  </div>

  <script src="js/i18n.js"></script>
  <script src="js/state.js"></script>
  <script src="js/api.js"></script>
  <script src="js/render.js"></script>
  <script src="js/game.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
