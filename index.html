<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>THE OBSERVER</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

    :root {
      --bg-primary: #0a0a0a;
      --bg-secondary: #111111;
      --bg-tertiary: #1a1a1a;
      --text-primary: #e8e8e8;
      --text-secondary: #888888;
      --text-dim: #555555;
      --accent: #00ff88;
      --accent-dim: #00aa5c;
      --danger: #ff4444;
      --warning: #ffaa00;
      --info: #4488ff;
      --scanline: rgba(0, 255, 136, 0.03);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'IBM Plex Mono', monospace;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, var(--scanline) 2px, var(--scanline) 4px);
      z-index: 9999;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
      display: grid;
      grid-template-columns: 1fr 300px;
      grid-template-rows: auto 1fr auto;
      gap: 20px;
      min-height: 100vh;
    }

    header {
      grid-column: 1 / -1;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 20px;
      background: var(--bg-secondary);
      border: 1px solid var(--bg-tertiary);
    }

    .logo {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      color: var(--accent);
      text-shadow: 0 0 10px var(--accent-dim);
    }

    .header-controls {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .lang-selector select {
      background: var(--bg-tertiary);
      color: var(--accent);
      border: 1px solid var(--accent-dim);
      padding: 5px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.7rem;
      cursor: pointer;
    }

    .status-bar {
      display: flex;
      gap: 30px;
      font-size: 0.8rem;
      color: var(--text-secondary);
    }

    .status-item { display: flex; align-items: center; gap: 8px; }

    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
      animation: pulse 2s infinite;
    }

    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

    .terminal {
      background: var(--bg-secondary);
      border: 1px solid var(--bg-tertiary);
      display: flex; flex-direction: column;
      min-height: 500px;
    }

    .terminal-header {
      padding: 10px 15px;
      background: var(--bg-tertiary);
      font-size: 0.75rem;
      color: var(--text-dim);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border-bottom: 1px solid var(--bg-tertiary);
    }

    .terminal-content {
      flex: 1; padding: 15px;
      overflow-y: auto;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.9rem; line-height: 1.6;
    }

    .message {
      margin-bottom: 20px;
      padding: 10px;
      border-left: 2px solid var(--text-dim);
      transition: all 0.3s ease;
      cursor: pointer;
    }

    .message:hover {
      border-left-color: var(--accent);
      background: rgba(0, 255, 136, 0.02);
    }

    .message-header {
      display: flex; justify-content: space-between;
      margin-bottom: 5px; font-size: 0.75rem; color: var(--text-dim);
    }

    .message-id { color: var(--info); }
    .message-body { color: var(--text-primary); }
    .message-flag {
      display: inline-block; margin-top: 5px; padding: 2px 8px;
      font-size: 0.65rem; background: rgba(255, 68, 68, 0.2); color: var(--danger);
    }

    .side-panel { display: flex; flex-direction: column; gap: 15px; }
    .panel { background: var(--bg-secondary); border: 1px solid var(--bg-tertiary); padding: 15px; }
    .panel-title {
      font-size: 0.7rem; color: var(--text-dim); letter-spacing: 0.15em;
      text-transform: uppercase; margin-bottom: 15px; padding-bottom: 10px;
      border-bottom: 1px solid var(--bg-tertiary);
    }

    .subject {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 10px; background: var(--bg-tertiary); font-size: 0.8rem;
      margin-bottom: 5px; cursor: pointer;
    }

    .status-ally { background: rgba(0, 255, 136, 0.2); color: var(--accent); }
    .status-suspect { background: rgba(255, 170, 0, 0.2); color: var(--warning); }
    .status-threat { background: rgba(255, 68, 68, 0.2); color: var(--danger); }
    .status-unknown { background: rgba(136, 136, 136, 0.2); color: var(--text-secondary); }

    .signal-log { display: flex; flex-direction: column; gap: 5px; max-height: 200px; overflow-y: auto; }
    .signal { font-size: 0.75rem; color: var(--text-secondary); padding: 5px; border-left: 2px solid var(--text-dim); }
    .signal.new { border-left-color: var(--accent); color: var(--accent); }

    .action-panel { display: flex; flex-direction: column; gap: 10px; }
    button {
      font-family: 'IBM Plex Mono', monospace; padding: 10px 15px;
      background: var(--bg-tertiary); border: 1px solid var(--text-dim);
      color: var(--text-primary); cursor: pointer; font-size: 0.8rem; text-align: left;
    }
    button:hover { border-color: var(--accent); color: var(--accent); }

    footer {
      grid-column: 1 / -1; padding: 15px 20px;
      background: var(--bg-secondary); border: 1px solid var(--bg-tertiary);
      font-size: 0.75rem; color: var(--text-dim); display: flex; justify-content: space-between;
    }

    .day-counter { color: var(--accent); }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">THE OBSERVER</div>
      <div class="header-controls">
        <div class="lang-selector">
          <select id="langSelect" onchange="changeLanguage(this.value)">
            <option value="en">ENGLISH</option>
            <option value="pt">PORTUGUÊS</option>
          </select>
        </div>
        <div class="status-bar">
          <div class="status-item">
            <div class="status-dot"></div>
            <span id="label-online">ONLINE</span>
          </div>
          <div class="status-item">
            <span id="label-day">DAY</span>
            <span class="day-counter" id="dayCounter">001</span>
          </div>
        </div>
      </div>
    </header>

    <main class="terminal">
      <div class="terminal-header" id="terminal-title">▸ INCOMING TRANSMISSIONS // TERMINAL_07</div>
      <div class="terminal-content" id="messageStream"></div>
    </main>

    <aside class="side-panel">
      <div class="panel">
        <div class="panel-title" id="title-analysis">Subject Analysis</div>
        <div class="analysis-board" id="subjectBoard"></div>
      </div>

      <div class="panel">
        <div class="panel-title" id="title-signals">Signal Log</div>
        <div class="signal-log" id="signalLog"></div>
      </div>

      <div class="panel">
        <div class="panel-title" id="title-actions">Actions</div>
        <div class="action-panel">
          <button onclick="exposeSubject()" id="btn-expose">▸ EXPOSE selected</button>
          <button onclick="pressureSubject()" id="btn-pressure">▸ PRESSURE subject</button>
          <button onclick="plantDoubt()" id="btn-doubt">▸ PLANT doubt</button>
          <button onclick="isolateSubject()" id="btn-isolate">▸ ISOLATE target</button>
          <button onclick="observeMore()" id="btn-observe">▸ OBSERVE mode</button>
        </div>
      </div>
    </aside>

    <footer>
      <span id="footer-version">SYSTEM v0.1.0 // OBSERVATION PROTOCOL ACTIVE</span>
      <span><span id="label-reputation">REPUTATION</span>: <span id="reputation">NEUTRAL</span></span>
    </footer>
  </div>

  <script>
    const i18n = {
      en: {
        online: "ONLINE", day: "DAY", terminal: "▸ INCOMING TRANSMISSIONS // TERMINAL_07",
        analysis: "Subject Analysis", signals: "Signal Log", actions: "Actions",
        btnExpose: "▸ EXPOSE selected", btnPressure: "▸ PRESSURE subject", btnDoubt: "▸ PLANT doubt",
        btnIsolate: "▸ ISOLATE target", btnObserve: "▸ OBSERVE mode",
        footer: "SYSTEM v0.1.0 // OBSERVATION PROTOCOL ACTIVE", reputationLabel: "REPUTATION",
        rep_neutral: "NEUTRAL", rep_respected: "RESPECTED", rep_known: "KNOWN", rep_suspicious: "SUSPICIOUS", rep_compromised: "COMPROMISED",
        status_ally: "ALLY", status_threat: "THREAT", status_suspect: "SUSPECT", status_unknown: "UNKNOWN",
        sig_no_subject: "No subject selected", sig_selected: "Selected subject", sig_exposed: "EXPOSED",
        sig_pressure: "PRESSURE: trust reduced", sig_doubt: "DOUBT planted", sig_isolating: "ISOLATING: reducing contact",
        sig_new_sub: "New subject detected",
        msg_pressure_def: "I... I don't know what you're talking about.",
        msg_doubt_def: "Wait... maybe I'm thinking about this wrong.",
        flagged: "FLAGGED"
      },
      pt: {
        online: "CONECTADO", day: "DIA", terminal: "▸ TRANSMISSÕES RECEBIDAS // TERMINAL_07",
        analysis: "Análise de Sujeitos", signals: "Log de Sinais", actions: "Ações",
        btnExpose: "▸ EXPOR selecionado", btnPressure: "▸ PRESSIONAR sujeito", btnDoubt: "▸ PLANTAR dúvida",
        btnIsolate: "▸ ISOLAR alvo", btnObserve: "▸ MODO OBSERVAÇÃO",
        footer: "SISTEMA v0.1.0 // PROTOCOLO DE OBSERVAÇÃO ATIVO", reputationLabel: "REPUTAÇÃO",
        rep_neutral: "NEUTRA", rep_respected: "RESPEITADA", rep_known: "CONHECIDA", rep_suspicious: "SUSPEITA", rep_compromised: "COMPROMETIDA",
        status_ally: "ALIADO", status_threat: "AMEAÇA", status_suspect: "SUSPEITO", status_unknown: "DESCONHECIDO",
        sig_no_subject: "Nenhum sujeito selecionado", sig_selected: "Sujeito selecionado", sig_exposed: "EXPOSTO",
        sig_pressure: "PRESSÃO: confiança reduzida", sig_doubt: "DÚVIDA plantada", sig_isolating: "ISOLANDO: reduzindo contato",
        sig_new_sub: "Novo sujeito detectado",
        msg_pressure_def: "Eu... eu não sei do que você está falando.",
        msg_doubt_def: "Espere... talvez eu esteja pensando errado sobre isso.",
        flagged: "MARCADO"
      }
    };

    const state = {
      lang: 'en', day: 1, reputation: 0, subjects: [], messages: [], signals: [], selectedSubject: null
    };

    const messageTemplates = {
      status_seeker: { en: ["I've been doing this longer than most.", "My track record speaks for itself."], pt: ["Faço isso há mais tempo que a maioria.", "Meu histórico fala por si só."] },
      quiet_one: { en: ["...", "Interesting.", "Tell me more."], pt: ["...", "Interessante.", "Me conte mais."] },
      talker: { en: ["So anyway, what I was saying is...", "This reminds me of when I..."], pt: ["Mas enfim, o que eu estava dizendo...", "Isso me lembra de quando eu..."] },
      drama_creator: { en: ["Sure, I'm SURE that's what happened.", "How convenient."], pt: ["Claro, tenho CERTEZA que foi isso.", "Que conveniente."] },
      hidden_agenda: { en: ["Let's focus on the main topic.", "We should discuss this in private."], pt: ["Vamos focar no tópico principal.", "Deveríamos discutir isso em privado."] }
    };

    function changeLanguage(lang) {
      state.lang = lang;
      render();
    }

    function generateSubject() {
      const types = Object.keys(messageTemplates);
      const archetype = types[Math.floor(Math.random() * types.length)];
      return {
        id: `SUB-${String(state.subjects.length + 1).padStart(3, '0')}`,
        name: "User_" + Math.floor(Math.random() * 999),
        archetype: archetype,
        trust: 50,
        status: 'unknown'
      };
    }

    function generateMessage(subject) {
      const templates = messageTemplates[subject.archetype][state.lang];
      return {
        id: `MSG-${String(state.messages.length + 1).padStart(4, '0')}`,
        subjectId: subject.id,
        text: templates[Math.floor(Math.random() * templates.length)],
        timestamp: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
        flagged: Math.random() > 0.8
      };
    }

    function init() {
      for (let i = 0; i < 4; i++) {
        const s = generateSubject();
        state.subjects.push(s);
        state.messages.push(generateMessage(s));
      }
      render();
    }

    function render() {
      const t = i18n[state.lang];
      document.getElementById('label-online').textContent = t.online;
      document.getElementById('label-day').textContent = t.day;
      document.getElementById('terminal-title').textContent = t.terminal;
      document.getElementById('title-analysis').textContent = t.analysis;
      document.getElementById('title-signals').textContent = t.signals;
      document.getElementById('title-actions').textContent = t.actions;
      document.getElementById('btn-expose').textContent = t.btnExpose;
      document.getElementById('btn-pressure').textContent = t.btnPressure;
      document.getElementById('btn-doubt').textContent = t.btnDoubt;
      document.getElementById('btn-isolate').textContent = t.btnIsolate;
      document.getElementById('btn-observe').textContent = t.btnObserve;
      document.getElementById('footer-version').textContent = t.footer;
      document.getElementById('label-reputation').textContent = t.reputationLabel;

      renderMessages();
      renderSubjects();
      renderSignals();
      updateStats();
    }

    function renderMessages() {
      const container = document.getElementById('messageStream');
      container.innerHTML = state.messages.map(msg => {
        const s = state.subjects.find(sub => sub.id === msg.subjectId);
        return `
          <div class="message" onclick="selectSubject('${msg.subjectId}')">
            <div class="message-header">
              <span class="message-id">${msg.subjectId} // ${s ? s.name : '???'}</span>
              <span class="message-timestamp">${msg.timestamp}</span>
            </div>
            <div class="message-body">${msg.text}</div>
            ${msg.flagged ? `<div class="message-flag">${i18n[state.lang].flagged}</div>` : ''}
          </div>`;
      }).join('');
      container.scrollTop = container.scrollHeight;
    }

    function renderSubjects() {
      const container = document.getElementById('subjectBoard');
      container.innerHTML = state.subjects.map(s => `
        <div class="subject" onclick="selectSubject('${s.id}')">
          <span class="subject-name">${s.id}</span>
          <span class="subject-status status-${s.status}">${i18n[state.lang]['status_' + s.status]}</span>
        </div>`).join('');
    }

    function renderSignals() {
      const container = document.getElementById('signalLog');
      container.innerHTML = state.signals.slice(-10).map(sig => `<div class="signal">[${sig.time}] ${sig.text}</div>`).join('');
    }

    function updateStats() {
      const t = i18n[state.lang];
      document.getElementById('dayCounter').textContent = String(state.day).padStart(3, '0');
      let repKey = 'rep_neutral';
      if (state.reputation > 20) repKey = 'rep_respected';
      else if (state.reputation < -20) repKey = 'rep_suspicious';
      document.getElementById('reputation').textContent = t[repKey];
    }

    function selectSubject(id) {
      state.selectedSubject = id;
      addSignal(`${i18n[state.lang].sig_selected}: ${id}`);
    }

    function addSignal(text) {
      state.signals.push({ text, time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' }) });
      renderSignals();
    }

    function exposeSubject() {
      if (!state.selectedSubject) return addSignal(i18n[state.lang].sig_no_subject);
      const s = state.subjects.find(sub => sub.id === state.selectedSubject);
      s.status = 'suspect';
      addSignal(`${i18n[state.lang].sig_exposed}: ${s.id}`);
      render();
    }

    function pressureSubject() {
      if (!state.selectedSubject) return addSignal(i18n[state.lang].sig_no_subject);
      const s = state.subjects.find(sub => sub.id === state.selectedSubject);
      state.messages.push({ ...generateMessage(s), text: i18n[state.lang].msg_pressure_def });
      addSignal(i18n[state.lang].sig_pressure);
      render();
    }

    function plantDoubt() {
      if (!state.selectedSubject) return addSignal(i18n[state.lang].sig_no_subject);
      const s = state.subjects.find(sub => sub.id === state.selectedSubject);
      state.messages.push({ ...generateMessage(s), text: i18n[state.lang].msg_doubt_def });
      addSignal(i18n[state.lang].sig_doubt);
      render();
    }

    function isolateSubject() {
      if (!state.selectedSubject) return addSignal(i18n[state.lang].sig_no_subject);
      addSignal(i18n[state.lang].sig_isolating);
      render();
    }

    function observeMore() {
      const s = generateSubject();
      state.subjects.push(s);
      state.messages.push(generateMessage(s));
      addSignal(i18n[state.lang].sig_new_sub);
      render();
    }

    init();
  </script>
</body>
</html>
